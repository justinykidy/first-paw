name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 2. 타입 체크
      - name: Type check
        run: npx tsc --noEmit

      # 3. 린트
      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      # 4. 빌드
      - name: Build
        run: npm run build

      # 5. 테스트 (있으면)
      - name: Test
        run: npm test --if-present

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # 6. Lighthouse CI
      - name: Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: '.lighthouserc.json'
